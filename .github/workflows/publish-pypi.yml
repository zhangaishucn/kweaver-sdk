name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"       # e.g. v0.4.0
      - "py-v[0-9]+.[0-9]+.[0-9]+"    # e.g. py-v0.4.0 (Python-only release)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip PyPI upload)"
        type: boolean
        default: false

jobs:
  publish-pypi:
    name: Build & Publish Python SDK → PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: packages/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/python/uv.lock

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest
        continue-on-error: true

      - name: Build distributions
        run: uv build

      - name: Verify package version
        run: |
          PKG_VERSION=$(uv run python -c "import importlib.metadata; print(importlib.metadata.version('kweaver-sdk'))")
          echo "Publishing kweaver-sdk==${PKG_VERSION} to PyPI"

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
