[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kweaver-sdk"
version = "0.6.8"
description = "KWeaver Python SDK — client library for knowledge network construction and querying"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "cryptography>=42.0",
    "charset-normalizer>=3.0",
    "kweaver-bkn>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kweaver"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "destructive: tests that mutate KWeaver state (create/build/delete KN)",
]

# ═══════════════════════════════════════════════════════════════════════════
# Coverage
# ═══════════════════════════════════════════════════════════════════════════
[tool.coverage.run]
source = ["src/kweaver"]
omit = [
    "*/tests/*",
    "*/test_*",
]
branch = true

[tool.coverage.report]
fail_under = 65
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]

[dependency-groups]
dev = [
    "playwright>=1.58.0",
]
